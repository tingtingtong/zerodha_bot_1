bot:
  name: "ZerodhaBot"
  version: "1.0.0"
  mode: "paper"                    # paper | semi_auto | live
  timezone: "Asia/Kolkata"
  log_level: "INFO"
  log_dir: "journaling/logs"

account:
  starting_capital: 200000
  currency: "INR"
  persist_state_to: "journaling/account_state.json"

capital_tiers:
  auto_detect: true
  notify_on_tier_change: true

risk:
  # null = use tier defaults (recommended — scales with capital automatically)
  risk_per_trade_pct: null
  daily_loss_pct: null
  weekly_dd_pct: null
  monthly_dd_pct: null
  deployment_pct: null
  max_per_trade_pct: null
  max_trades_per_day: null
  max_open_positions: null
  # Always set explicitly
  min_rr_ratio: 1.5
  cooldown_minutes_after_loss: 30
  consecutive_loss_halt: 3
  min_trade_value: 2000
  size_reduction_after_losses: 0.50
  setup_quality_min: "B"
  vix_reduce_threshold: 22.0   # cautious sizing above this
  vix_halt_threshold: 28.0     # no new trades above this
  vix_kill_threshold: 35.0     # close all positions above this

strategy:
  active:
    - "ema_pullback"
    - "ema_breakdown"
    - "mean_reversion"
    # etf_momentum disabled — backtests show consistent losses (win rate 34%, PF 0.66)
  primary_timeframe: "15m"
  daily_trend_filter: true
  no_trade_before_ist: "09:45"
  no_trade_after_ist: "14:45"
  force_exit_ist: "15:15"

market_research:
  universe: "NIFTY_200"
  etf_symbols:
    - "NIFTYBEES"
    - "BANKBEES"
    - "GOLDBEES"
    - "JUNIORBEES"
    - "ITBEES"
  # Preferred symbols — ranked by 5yr backtest (255 stocks scanned, 2021-2026)
  # Score = net P&L + Sharpe + Profit Factor composite
  preferred_symbols:
    - "TITAGARH"     # #1:  73% WR, Sharpe 9.78, avg +1304/mo
    - "RVNL"         # #2:  65% WR, Sharpe 8.61, avg +1292/mo
    - "ONGC"         # #3:  68% WR, Sharpe 7.76, avg  +997/mo
    - "NBCC"         # #4:  69% WR, Sharpe 7.61, avg  +985/mo
    - "SBIN"         # #5:  62% WR, Sharpe 6.85, avg  +863/mo
    - "BHEL"         # #6:  56% WR, Sharpe 6.02, avg  +824/mo
    - "RAYMOND"      # #7:  61% WR, Sharpe 6.32, avg  +933/mo
    - "PRESTIGE"     # #8:  63% WR, Sharpe 6.01, avg  +818/mo
    - "BAJAJHLDNG"   # #9:  56% WR, Sharpe 5.66, avg  +811/mo
    - "VEDL"         # #10: 54% WR, Sharpe 6.36, avg  +836/mo
    - "CUMMINSIND"   # #11: 62% WR, Sharpe 6.33, avg  +769/mo
    - "DIXON"        # #12: 62% WR, Sharpe 6.18, avg  +702/mo
    - "SCHAEFFLER"   # #13: 58% WR, Sharpe 5.35, avg  +757/mo
    - "SRF"          # #14: 65% WR, Sharpe 5.67, avg  +704/mo
    - "INDUSTOWER"   # #15: 64% WR, Sharpe 5.65, avg  +658/mo
    - "WELCORP"      # #16: 56% WR, Sharpe 5.03, avg  +739/mo
    - "HUDCO"        # #17: 61% WR, Sharpe 5.24, avg  +681/mo
    - "COFORGE"      # #18: 62% WR, Sharpe 5.14, avg  +607/mo
    - "KPRMILL"      # #19: 55% WR, Sharpe 4.50, avg  +675/mo
    - "CRISIL"       # #20: 54% WR, Sharpe 4.78, avg  +606/mo
    # Removed: AXISBANK (#63), KOTAKBANK (#68), ICICIBANK (#106) — still profitable
    # but outperformed by smaller/mid-caps in this strategy
    # Hard avoid: HDFCBANK, BIOCON, IGL, CONCOR, ABFRL, SYNGENE, AMBUJACEM
  universe_size: 100
  max_watchlist_size: 20
  max_active_candidates: 10
  min_score_for_watchlist: 60
  min_avg_daily_turnover: 50000000
  min_avg_daily_volume: 200000
  min_price: 50
  max_price: 10000
  min_atr_pct: 0.5
  max_atr_pct: 5.0
  vix_reduce_threshold: 22.0
  vix_halt_threshold: 28.0
  vix_kill_threshold: 35.0
  nifty_fall_halt_pct: -1.5
  nifty_fall_kill_pct: -2.5
  watchlist_refresh_times_ist:
    - "09:20"
    - "10:00"
    - "14:00"
  avoid_event_within_days: 3

data:
  provider_mode: "zerodha_with_fallback"  # free_only | zerodha | zerodha_with_fallback
  cache_dir: ".cache/market_data"
  cache_expiry_minutes: 15
  historical_lookback_days: 365
  intraday_lookback_days: 3

notifications:
  enabled: true
  telegram_bot_token: ""
  telegram_chat_id: ""
  notify_on:
    - trade_entry
    - trade_exit
    - kill_switch
    - tier_change
    - daily_summary
    - api_error

reporting:
  journal_dir: "journaling/logs"
  report_dir: "reporting/output"
  daily_report_time_ist: "15:45"
  save_rejected_trades: true

options:
  enabled: true              # Paper mode only — live options need separate F&O setup
  capital_pct: 0.10          # 10% of total capital per options trade (e.g. Rs.20k at Rs.2L)
  # Grade-A signals only: RSI > 65 + volume >= 2x → buy NIFTY weekly ATM CE (long) or PE (short)
  # Lot size: 25 | Strike: ATM rounded to nearest 50 | Estimated premium: 0.4% of NIFTY spot
  # P&L simulation: delta=0.5, stock-to-NIFTY correlation=0.35
  # Exits: 50% at equity T1, remaining at equity full exit
  max_concurrent_positions: 3

backtesting:
  default_start: "2022-01-01"
  default_end: "2024-01-01"
  slippage_pct: 0.10
  commission_per_order: 20.0
  results_dir: "backtesting/results"

dashboard:
  enabled: true
  host: "localhost"
  port: 8501
  auto_refresh_seconds: 30
